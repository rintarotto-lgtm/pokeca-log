<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#adb5bd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6c757d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#343a40;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30">
      <circle cx="15" cy="15" r="1.5" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" rx="12" ry="12" fill="url(#bg)"/>
  <rect width="800" height="450" rx="12" ry="12" fill="url(#dots)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="120" r="80" fill="rgba(255,255,255,0.05)" />
  <circle cx="600" cy="350" r="100" fill="rgba(255,255,255,0.04)" />
  <!-- Card icon in center -->
  <rect x="350" y="120" width="100" height="140" rx="8" ry="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <circle cx="400" cy="170" r="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="370" y1="210" x2="430" y2="210" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <line x1="375" y1="225" x2="425" y2="225" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <line x1="380" y1="240" x2="420" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Sparkles -->
  <polygon points="300,100 303,110 313,110 305,116 308,126 300,120 292,126 295,116 287,110 297,110" fill="#adb5bd" opacity="0.4" filter="url(#glow)"/>
  <polygon points="520,340 523,350 533,350 525,356 528,366 520,360 512,366 515,356 507,350 517,350" fill="#adb5bd" opacity="0.3" filter="url(#glow)"/>
  <!-- Main text -->
  <text x="400" y="330" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="36" font-weight="bold" fill="#ffffff" filter="url(#glow)">ポケモンカード</text>
  <!-- Subtitle -->
  <text x="400" y="370" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="20" fill="#adb5bd">記事サムネイル</text>
  <!-- Bottom text -->
  <text x="400" y="420" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">ポケモンカードゲーム</text>
</svg>