<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffed4a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5c542;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30">
      <circle cx="15" cy="15" r="1.5" fill="rgba(0,0,0,0.05)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" rx="12" ry="12" fill="url(#bg)"/>
  <rect width="800" height="450" rx="12" ry="12" fill="url(#dots)"/>
  <!-- Lightning bolt decorations -->
  <polygon points="180,50 200,150 170,150 190,250" fill="rgba(255,255,255,0.15)" />
  <polygon points="620,30 640,130 610,130 630,230" fill="rgba(255,255,255,0.1)" />
  <!-- Decorative circles -->
  <circle cx="100" cy="350" r="80" fill="rgba(255,255,255,0.1)" />
  <circle cx="700" cy="100" r="60" fill="rgba(255,255,255,0.08)" />
  <!-- Sparkles -->
  <polygon points="300,80 304,95 319,95 307,104 311,119 300,110 289,119 293,104 281,95 296,95" fill="#fff" opacity="0.7" filter="url(#glow)"/>
  <polygon points="550,370 553,380 563,380 555,386 558,396 550,390 542,396 545,386 537,380 547,380" fill="#fff" opacity="0.5" filter="url(#glow)"/>
  <!-- Main text -->
  <text x="400" y="190" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="48" font-weight="bold" fill="#4a3600" filter="url(#glow)">超電ブレイカー</text>
  <!-- Subtitle -->
  <text x="400" y="250" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="24" fill="#6b4f00">パック開封シミュレーター</text>
  <!-- Decorative line -->
  <line x1="250" y1="280" x2="550" y2="280" stroke="#4a3600" stroke-width="1" opacity="0.3"/>
  <!-- Bottom text -->
  <text x="400" y="330" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="18" fill="rgba(74,54,0,0.7)">ポケモンカードゲーム</text>
  <!-- Card icons -->
  <rect x="320" y="360" width="40" height="56" rx="4" ry="4" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <rect x="380" y="360" width="40" height="56" rx="4" ry="4" fill="rgba(0,0,0,0.12)" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
  <rect x="440" y="360" width="40" height="56" rx="4" ry="4" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
</svg>