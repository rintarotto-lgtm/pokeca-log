<svg xmlns="http://www.w3.org/2000/svg" width="300" height="420" viewBox="0 0 300 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#90e0ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.15" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="296" height="416" rx="16" ry="16" fill="#1a1a2e" stroke="#caf0f8" stroke-width="2"/>
  <rect x="10" y="10" width="280" height="400" rx="12" ry="12" fill="url(#bg)"/>
  <rect x="10" y="10" width="280" height="400" rx="12" ry="12" fill="url(#shine)"/>
  <!-- Sparkles -->
  <polygon points="50,60 53,70 63,70 55,76 58,86 50,80 42,86 45,76 37,70 47,70" fill="#caf0f8" opacity="0.8" filter="url(#glow)"/>
  <polygon points="240,80 242,87 249,87 243,91 245,98 240,94 235,98 237,91 231,87 238,87" fill="#caf0f8" opacity="0.6" filter="url(#glow)"/>
  <polygon points="60,320 62,327 69,327 63,331 65,338 60,334 55,338 57,331 51,327 58,327" fill="#caf0f8" opacity="0.7" filter="url(#glow)"/>
  <polygon points="230,300 232,307 239,307 233,311 235,318 230,314 225,318 227,311 221,307 228,307" fill="#caf0f8" opacity="0.5" filter="url(#glow)"/>
  <!-- Inner frame -->
  <rect x="30" y="100" width="240" height="180" rx="8" ry="8" fill="rgba(0,0,0,0.1)" stroke="rgba(202,240,248,0.4)" stroke-width="1"/>
  <!-- Pokemon name -->
  <text x="150" y="55" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="32" font-weight="bold" fill="#023e8a" filter="url(#glow)">ルギア</text>
  <!-- ex label -->
  <text x="150" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0077b6" font-style="italic" filter="url(#glow)">ex</text>
  <!-- Silhouette placeholder -->
  <text x="150" y="200" text-anchor="middle" font-family="sans-serif" font-size="60" fill="rgba(0,0,0,0.1)">&#x1F54A;</text>
  <!-- HP -->
  <text x="250" y="55" text-anchor="end" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#023e8a">HP 300</text>
  <!-- Rarity -->
  <rect x="100" y="360" width="100" height="30" rx="15" ry="15" fill="rgba(0,0,0,0.3)" stroke="#caf0f8" stroke-width="1"/>
  <text x="150" y="381" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">SR</text>
  <text x="150" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(0,0,0,0.4)">PLACEHOLDER</text>
</svg>