<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#95d5b2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d6a4f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b4332;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30">
      <circle cx="15" cy="15" r="1.5" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>
  <rect width="800" height="450" rx="12" ry="12" fill="url(#bg)"/>
  <rect width="800" height="450" rx="12" ry="12" fill="url(#dots)"/>
  <!-- Chart illustration -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="250" x2="700" y2="250" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="200" x2="700" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <!-- Trend line -->
  <polyline points="120,330 200,310 280,320 360,280 440,250 520,230 600,200 680,180" fill="none" stroke="#95d5b2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Data points -->
  <circle cx="120" cy="330" r="4" fill="#b7e4c7"/>
  <circle cx="200" cy="310" r="4" fill="#b7e4c7"/>
  <circle cx="280" cy="320" r="4" fill="#b7e4c7"/>
  <circle cx="360" cy="280" r="4" fill="#b7e4c7"/>
  <circle cx="440" cy="250" r="4" fill="#b7e4c7"/>
  <circle cx="520" cy="230" r="4" fill="#b7e4c7"/>
  <circle cx="600" cy="200" r="4" fill="#b7e4c7"/>
  <circle cx="680" cy="180" r="5" fill="#95d5b2" filter="url(#glow)"/>
  <!-- Sparkles -->
  <polygon points="350,80 354,95 369,95 357,104 361,119 350,110 339,119 343,104 331,95 346,95" fill="#b7e4c7" opacity="0.5" filter="url(#glow)"/>
  <!-- Main text -->
  <text x="400" y="110" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#glow)">価格トレンド</text>
  <!-- Subtitle -->
  <text x="400" y="155" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="22" fill="#95d5b2">相場分析と価格推移</text>
  <!-- Arrow up indicator -->
  <polygon points="720,170 735,195 725,195 725,220 715,220 715,195 705,195" fill="#52b788" opacity="0.6"/>
  <!-- Bottom label -->
  <text x="400" y="400" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">ポケモンカードゲーム</text>
</svg>