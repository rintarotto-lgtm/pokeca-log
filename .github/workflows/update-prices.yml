name: Update Card Prices

# 毎日 9:00 AM JST (0:00 UTC) に実行
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest prices
        run: npx tsx scripts/fetch-daily-prices.ts
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/card-history/
          git diff --staged --quiet || git commit -m "chore: daily price update [skip ci]"
          git push
