name: Update Card Prices

on:
  schedule:
    # 毎日 3:00 AM JST (18:00 UTC 前日) に実行
    - cron: "0 18 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scraping script
        run: npx tsx scripts/scrape-prices.ts

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices/prices.json data/prices/history.json
          git diff --staged --quiet || git commit -m "chore: update card prices [skip ci]"
          git push
